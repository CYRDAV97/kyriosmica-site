<svg width="400" height="400" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B84B"/>
      <stop offset="100%" style="stop-color:#C9972A"/>
    </linearGradient>
    <linearGradient id="cyanG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>
    <radialGradient id="hybridG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#FFFFFF"/>
      <stop offset="35%"  style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#C9972A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond carré arrondi (format réseaux sociaux) -->
  <rect width="100" height="100" fill="#0A1628" rx="20"/>
  <rect width="98" height="98" fill="none" stroke="#C9972A22" stroke-width="0.5" rx="20" x="1" y="1"/>

  <!-- Hexagone parfait centré -->
  <polygon points="50,8 86.37,29 86.37,71 50,92 13.63,71 13.63,29"
    fill="none" stroke="url(#goldG)" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Triangle OR : sommets 0,2,4 -->
  <polygon points="50,8 86.37,71 13.63,71"
    fill="#C9972A0c" stroke="url(#goldG)" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Triangle CYAN : sommets 1,3,5 -->
  <polygon points="86.37,29 50,92 13.63,29"
    fill="#0891B20c" stroke="url(#cyanG)" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- 3 points dorés aux sommets 0,2,4 -->
  <circle cx="50"    cy="8"  r="3.8" fill="url(#goldG)" filter="url(#glow)"/>
  <circle cx="86.37" cy="71" r="3.8" fill="url(#goldG)" filter="url(#glow)"/>
  <circle cx="13.63" cy="71" r="3.8" fill="url(#goldG)" filter="url(#glow)"/>

  <!-- Point hybride central -->
  <circle cx="50" cy="50" r="6.5" fill="url(#hybridG)" filter="url(#glowS)"/>
  <circle cx="50" cy="50" r="2.6" fill="#FFFFFF" opacity="0.95"/>
</svg>
