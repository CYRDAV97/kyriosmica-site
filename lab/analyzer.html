<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICA-Kernel Analyzer · kyriosMICA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #020817;
    --surface: #0a1628;
    --card:    #0f1f35;
    --gold:    #C9972A;
    --cyan:    #22d3ee;
    --green:   #22c55e;
    --red:     #ef4444;
    --orange:  #f97316;
    --gray:    #64748b;
    --dim:     #334155;
    --white:   #f1f5f9;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(#ffffff05 1px, transparent 1px),
      linear-gradient(90deg, #ffffff05 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(2,8,23,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(51,65,85,0.4);
    padding: 14px 20px;
    display: flex; align-items: center;
    justify-content: space-between;
  }

  .header-title { color: var(--cyan); font-weight: 800; font-size: 16px; letter-spacing: 1px; }
  .header-sub   { color: var(--gray); font-size: 9px; letter-spacing: 1px; margin-top: 2px; }

  .api-status {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
    transition: all 0.3s;
  }
  .api-status.healthy {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    color: var(--green);
  }
  .api-status.error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  /* Main */
  .main { max-width: 860px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: 12px; padding: 20px;
    border: 1px solid rgba(51,65,85,0.3);
    margin-bottom: 16px;
  }

  /* Labels */
  .label {
    color: var(--gray); font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Demo buttons */
  .demo-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .demo-label { color: var(--gray); font-size: 10px; }
  .demo-btn {
    padding: 4px 12px; border-radius: 4px; cursor: pointer;
    border: 1px solid var(--dim); background: transparent;
    color: var(--gray); font-size: 11px; font-family: monospace;
    transition: all 0.2s;
  }
  .demo-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* Textarea */
  textarea, input[type=number] {
    width: 100%; background: var(--bg);
    border: 1px solid rgba(51,65,85,0.5);
    border-radius: 8px; padding: 10px 14px;
    color: var(--white); font-family: monospace; font-size: 13px;
    transition: border-color 0.2s; resize: vertical;
  }
  textarea:focus, input:focus {
    outline: none;
    border-color: rgba(34,211,238,0.5);
  }

  /* Conditions grid */
  .conditions-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin: 14px 0;
  }
  .condition-hint { color: var(--gray); font-size: 9px; margin-top: 3px; }
  input[type=number] { resize: none; color: var(--cyan); font-size: 14px; }

  /* Analyze button */
  .btn-analyze {
    width: 100%; padding: 13px; border-radius: 8px;
    border: none; cursor: pointer; font-weight: 800;
    font-size: 14px; font-family: monospace; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--gold), #0891b2);
    color: #0A1628; transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-analyze:disabled {
    background: var(--dim); color: var(--gray); cursor: not-allowed;
  }
  .btn-analyze:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--dim); border-top-color: var(--cyan);
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; padding: 12px 16px;
    color: var(--red); font-size: 13px; margin-bottom: 16px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 10px; margin-bottom: 16px;
  }
  .stat-box {
    background: var(--card); border-radius: 8px; padding: 12px 16px;
    border: 1px solid rgba(51,65,85,0.2);
  }
  .stat-label { color: var(--gray); font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 800; }
  .stat-sub   { color: var(--gray); font-size: 10px; margin-top: 3px; }

  /* Amplitudes */
  .amp-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-top: 10px;
  }
  .amp-box {
    background: var(--card); border-radius: 8px; padding: 10px 12px;
  }
  .amp-val { font-size: 18px; font-weight: 800; font-family: monospace; margin: 4px 0; }
  .amp-sub { color: var(--gray); font-size: 10px; }
  .amp-bar-track { margin-top: 6px; height: 3px; background: var(--dim); border-radius: 2px; }
  .amp-bar-fill  { height: 100%; border-radius: 2px; transition: width 1s ease; }

  /* Tabs */
  .tabs {
    display: flex; border-bottom: 1px solid rgba(51,65,85,0.3);
    margin-bottom: 16px;
  }
  .tab-btn {
    background: none; border: none; padding: 10px 16px;
    cursor: pointer; font-family: monospace; font-size: 11px;
    color: var(--gray); border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); font-weight: 700; }
  .tab-btn:hover:not(.active) { color: var(--white); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Genome map */
  .genome-strip {
    display: flex; flex-wrap: wrap; gap: 2px;
    background: var(--surface); border-radius: 8px; padding: 10px;
    border: 1px solid rgba(51,65,85,0.2);
  }
  .codon-bar {
    width: 10px; height: 24px; border-radius: 2px;
    cursor: pointer; transition: all 0.15s;
    position: relative;
  }
  .codon-bar:hover { transform: scaleY(1.3); }
  .codon-bar[data-risk="HIGH"]   { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); }
  .codon-bar[data-risk="MEDIUM"] { background: rgba(249,115,22,0.2); border: 1px solid rgba(249,115,22,0.3); }
  .codon-bar[data-risk="LOW"]    { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.3); }
  .codon-bar[data-risk="HIGH"]:hover   { background: #ef4444; }
  .codon-bar[data-risk="MEDIUM"]:hover { background: #f97316; }
  .codon-bar[data-risk="LOW"]:hover    { background: #22c55e; }

  .legend { display: flex; gap: 16px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Risk table */
  .risk-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; margin-bottom: 6px;
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.2);
    border-left: 3px solid #ef4444;
    border-radius: 6px; flex-wrap: wrap;
  }
  .risk-pos   { color: var(--gray); font-size: 11px; min-width: 40px; }
  .risk-codon { color: var(--gold); font-weight: 700; font-size: 13px; }
  .risk-info  { color: var(--gray); font-size: 10px; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 3px; letter-spacing: 1px; font-family: monospace;
  }
  .badge-HIGH   { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
  .badge-MEDIUM { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.2); }
  .badge-LOW    { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }

  /* MIH-21 */
  .mih-item {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px; padding: 10px 14px; margin-bottom: 8px;
    background: var(--card); border-radius: 8px;
    border: 1px solid rgba(51,65,85,0.3);
  }
  .mih-label { color: var(--gray); font-size: 9px; }
  .mih-val   { font-family: monospace; font-size: 12px; margin-top: 2px; }

  /* Raw table */
  .raw-table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: monospace; min-width: 500px; }
  .raw-table th { color: var(--gray); font-weight: 400; padding: 6px 8px; border-bottom: 1px solid rgba(51,65,85,0.4); text-align: left; font-size: 9px; letter-spacing: 1px; white-space: nowrap; }
  .raw-table td { padding: 6px 8px; border-bottom: 1px solid rgba(51,65,85,0.15); }
  .overflow-x { overflow-x: auto; }

  /* Footer */
  .footer { text-align: center; color: var(--dim); font-size: 9px; margin-top: 12px; letter-spacing: 1px; }
  .footer a { color: var(--cyan); text-decoration: none; }

  /* Fade in */
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade { animation: fadeIn 0.4s ease; }

  /* Tooltip */
  .tooltip-container { position: relative; }
  .tooltip {
    display: none; position: absolute; bottom: 130%;
    left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--dim);
    border-radius: 6px; padding: 6px 10px;
    font-size: 11px; white-space: nowrap; z-index: 100;
    color: var(--white);
  }
  .codon-bar:hover + .tooltip,
  .tooltip-container:hover .tooltip { display: block; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .conditions-grid { grid-template-columns: 1fr; }
    .amp-grid { grid-template-columns: 1fr; }
    .mih-item { grid-template-columns: 1fr 1fr; }
  }
</style>
<!-- kyriosMICA shared assets (v3) -->
<link rel="stylesheet" href="/assets/shared/brand.css">
<link rel="stylesheet" href="/assets/shared/nav.css">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="alternate icon" href="/assets/favicon.ico">
<meta name="description" content="Sequence Analyzer · Analyseur de séquences ADN basé sur le kernel MICA (TQIM-Davoh v3.1). kyriosMICA." data-fr="Sequence Analyzer · Analyseur de séquences ADN basé sur le kernel MICA (TQIM-Davoh v3.1). kyriosMICA." data-en="Sequence Analyzer · DNA sequence analyzer based on the MICA kernel (TQIM-Davoh v3.1). kyriosMICA."/>
<link rel="canonical" href="https://kyriosmica.com/lab/analyzer.html"/>
</head>
<body>
<div id="kyrios-nav"></div>


<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">MICA-Kernel <span style="color:var(--gray);font-size:10px;font-weight:400">Sequence Analyzer</span></div>
    <div class="header-sub">kyriosMICA · TQIM-Davoh · Qudits-36</div>
  </div>
  <div class="api-status error" id="apiStatus">
    <div class="status-dot" id="statusDot" style="background:var(--red)"></div>
    <span id="statusText">Connexion...</span>
  </div>
</div>

<div class="main">

  <!-- Input panel -->
  <div class="card">
    <!-- Demo buttons -->
    <div class="demo-row">
      <span class="demo-label">Démo :</span>
      <button class="demo-btn" onclick="loadDemo('ATGGATTATCCTTATGAATTTGCTCCT')">BRCA1</button>
      <button class="demo-btn" onclick="loadDemo('GATGCTGTTTTAAAAGGTTTGGAGTTTTCTTCTGGG')">SARS-CoV-2</button>
      <button class="demo-btn" onclick="loadDemo('GCAGAGTGTGGTACCTGTAAAGACCTGGCC')">NR3C1</button>
    </div>

    <!-- Sequence -->
    <div class="label">Séquence ADN (FASTA ou brut)</div>
    <textarea id="seqInput" rows="4"
      placeholder=">gene_name&#10;ATGCCCGATAAT..."></textarea>

    <!-- Conditions -->
    <div class="conditions-grid">
      <div>
        <div class="label">Température (K)</div>
        <input type="number" id="tempInput" value="310" min="270" max="400" step="0.5">
        <div class="condition-hint">310K = température corporelle</div>
      </div>
      <div>
        <div class="label">pH</div>
        <input type="number" id="pHInput" value="7.4" min="0" max="14" step="0.1">
        <div class="condition-hint">7.4 = physiologique</div>
      </div>
      <div>
        <div class="label">Force ionique (mol/L)</div>
        <input type="number" id="ionInput" value="0.15" min="0" max="2" step="0.01">
        <div class="condition-hint">0.15 = sérum sanguin</div>
      </div>
    </div>

    <!-- Button -->
    <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">
      ⬡ ANALYSER AVEC MICA-KERNEL
    </button>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox" style="display:none"></div>

  <!-- Results -->
  <div id="results" style="display:none" class="fade">

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Amplitudes -->
    <div class="card" id="ampPanel"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('map',this)">Carte génomique</button>
      <button class="tab-btn" onclick="switchTab('risk',this)">Sites à risque</button>
      <button class="tab-btn" onclick="switchTab('mih',this)">MIH-21</button>
      <button class="tab-btn" onclick="switchTab('raw',this)">Données brutes</button>
    </div>

    <div class="card" style="padding:16px">
      <div id="tab-map" class="tab-content active"></div>
      <div id="tab-risk" class="tab-content"></div>
      <div id="tab-mih" class="tab-content"></div>
      <div id="tab-raw" class="tab-content"></div>
    </div>

    <!-- Footer -->
    <div class="footer" id="resultFooter"></div>
  </div>

</div>

<script>
const API = "https://api.kyriosmica.com";

// ── Health check ─────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    const el = document.getElementById("apiStatus");
    const dot = document.getElementById("statusDot");
    const txt = document.getElementById("statusText");
    if (d.status === "healthy") {
      el.className = "api-status healthy";
      dot.style.background = "var(--green)";
      dot.style.boxShadow = "0 0 6px var(--green)";
      txt.textContent = "API LIVE";
    }
  } catch {
    document.getElementById("statusText").textContent = "API OFFLINE";
  }
}
checkHealth();

// ── Demo loader ──────────────────────────────────────────────
function loadDemo(seq) {
  document.getElementById("seqInput").value = seq;
}

// ── Tab switcher ─────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`tab-${id}`).classList.add("active");
  btn.classList.add("active");
}

// ── Main analysis ─────────────────────────────────────────────
async function runAnalysis() {
  const seq = document.getElementById("seqInput").value.trim();
  if (!seq) return;

  const btn = document.getElementById("analyzeBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Calcul MICA-Kernel en cours...';
  document.getElementById("errorBox").style.display = "none";
  document.getElementById("results").style.display = "none";

  try {
    const res = await fetch(`${API}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sequence: seq,
        T_K: parseFloat(document.getElementById("tempInput").value),
        pH:  parseFloat(document.getElementById("pHInput").value),
        ionic_strength: parseFloat(document.getElementById("ionInput").value),
        run_mc: false,
      })
    });
    if (!res.ok) throw new Error(`Erreur API ${res.status}`);
    const data = await res.json();
    renderResults(data);
  } catch(e) {
    const eb = document.getElementById("errorBox");
    eb.textContent = `✗ ${e.message} — Vérifier api.kyriosmica.com`;
    eb.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.innerHTML = "⬡ ANALYSER AVEC MICA-KERNEL";
  }
}

// ── Render results ────────────────────────────────────────────
function renderResults(data) {
  const s = data.summary;
  const amp = s.amplitudes;
  const cond = s.conditions;

  // Stats
  document.getElementById("statsGrid").innerHTML = [
    { label:"Codons",      val: s.n_codons,           color:"#22d3ee" },
    { label:"Rang MRK moy",val: s.mrk_rank_mean,      color:"#C9972A",
      sub:`±${s.mrk_rank_std}` },
    { label:"Sites HIGH",  val: s.high_risk_sites,    color:"#ef4444",
      sub:"rang MRK ≤ 3" },
    { label:"E_res moyen", val:`${s.E_res_mean} kcal`, color:"#22c55e" },
  ].map(s => `
    <div class="stat-box">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="color:${s.color}">${s.val}</div>
      ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ""}
    </div>
  `).join("");

  // Amplitudes
  document.getElementById("ampPanel").innerHTML = `
    <div class="label">
      POSTULAT I · INDÉTERMINATION — Amplitudes à ${cond.T_K}K · pH ${cond.pH}
    </div>
    <div class="amp-grid">
      ${[
        { label:"α(−1) compression", val:amp.alpha_minus1,
          p:amp.P_minus1, color:"#ef4444", note:"tunnel" },
        { label:"α(0) équilibre",    val:amp.alpha_0,
          p:amp.P_0,      color:"#22d3ee", note:"dominant" },
        { label:"α(+1) extension",   val:amp.alpha_plus1,
          p:amp.P_plus1,  color:"#22c55e", note:"ouverture" },
      ].map(a => `
        <div class="amp-box" style="border:1px solid ${a.color}22">
          <div class="amp-label" style="color:var(--gray);font-size:9px">${a.label}</div>
          <div class="amp-val" style="color:${a.color}">${a.val}</div>
          <div class="amp-sub">P = ${(a.p*100).toFixed(1)}% · ${a.note}</div>
          <div class="amp-bar-track">
            <div class="amp-bar-fill" style="width:${a.p*100}%;background:${a.color}"></div>
          </div>
        </div>
      `).join("")}
    </div>
  `;

  // Genome map
  const codons = data.codons || [];
  document.getElementById("tab-map").innerHTML = `
    <div class="label">CARTE GÉNOMIQUE — ${codons.length} codons</div>
    <div class="genome-strip" id="genomeStrip">
      ${codons.map(c => `
        <div class="codon-bar" data-risk="${c.risk_level}"
          title="Pos ${c.position} · ${c.codon} · Rang ${c.rank} · ${c.risk_level}">
        </div>
      `).join("")}
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(239,68,68,0.3);border:1px solid #ef4444"></div>
        <span style="color:#ef4444;font-size:10px">HIGH (rang ≤ 3)</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(249,115,22,0.3);border:1px solid #f97316"></div>
        <span style="color:#f97316;font-size:10px">MEDIUM (rang = 4)</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(34,197,94,0.3);border:1px solid #22c55e"></div>
        <span style="color:#22c55e;font-size:10px">LOW (rang ≥ 5)</span>
      </div>
    </div>
  `;

  // Risk sites
  const highSites = data.high_risk_sites || [];
  document.getElementById("tab-risk").innerHTML = highSites.length ? `
    <div class="label">⚠ SITES À SURVEILLER — Rang MRK ≤ 3 · Postulat de la Mutabilité</div>
    ${highSites.slice(0,10).map(s => `
      <div class="risk-item">
        <span class="risk-pos">#${s.pos ?? s.position}</span>
        <span class="risk-codon">${s.codon}</span>
        <span class="risk-info">Rang=${s.rank}</span>
        <span class="risk-info">E_res=${s.E_res} kcal/mol</span>
        <span class="badge badge-HIGH">⚠ HIGH</span>
      </div>
    `).join("")}
    <div style="color:var(--gray);font-size:10px;margin-top:10px">
      Prédiction pré-enregistrée Avril 2026 · p=0.0002 · kyriosMICA
    </div>
  ` : `<div style="color:var(--gray);font-size:13px">Aucun site à haut risque détecté.</div>`;

  // MIH-21
  const wins = data.mih21_windows || [];
  const stabColors = { STABLE:"#22c55e", MODERATE:"#f97316", UNSTABLE:"#ef4444" };
  document.getElementById("tab-mih").innerHTML = wins.length ? `
    <div class="label">POSTULAT II · COHÉRENCE — Fenêtres MIH-21 (7 codons · 21 pb · 2 tours B-DNA)</div>
    ${wins.slice(0,6).map(w => `
      <div class="mih-item">
        <div>
          <div class="mih-label">Position</div>
          <div class="mih-val" style="color:var(--white)">${w.window_start}–${w.window_end}</div>
        </div>
        <div>
          <div class="mih-label">ν_TIV</div>
          <div class="mih-val" style="color:var(--cyan)">${w.nu_TIV_THz} THz</div>
        </div>
        <div>
          <div class="mih-label">Rang moyen</div>
          <div class="mih-val" style="color:var(--gold)">${w.mean_rank}</div>
        </div>
        <div>
          <div class="mih-label">Stabilité</div>
          <div class="mih-val" style="color:${stabColors[w.cavity_stability]||'#f97316'};font-weight:700">
            ${w.cavity_stability}
          </div>
        </div>
      </div>
    `).join("")}
  ` : `<div style="color:var(--gray);font-size:13px">Séquence trop courte pour MIH-21 (min 7 codons).</div>`;

  // Raw table
  document.getElementById("tab-raw").innerHTML = `
    <div class="label">DONNÉES BRUTES — ${Math.min(codons.length,15)} premiers codons</div>
    <div class="overflow-x">
      <table class="raw-table">
        <thead><tr>
          <th>Pos</th><th>Codon</th><th>EVK</th>
          <th>Rang</th><th>Frob</th><th>E_res</th>
          <th>ν_TIV (THz)</th><th>Risque</th>
        </tr></thead>
        <tbody>
          ${codons.slice(0,15).map(c => `
            <tr>
              <td style="color:var(--gray)">${c.position}</td>
              <td style="color:var(--gold);font-weight:700">${c.codon}</td>
              <td style="color:var(--gray);font-size:10px">${c.evk_label}</td>
              <td style="color:var(--cyan)">${c.rank}</td>
              <td style="color:var(--gray)">${c.frobenius}</td>
              <td style="color:var(--green)">${c.E_res}</td>
              <td style="color:var(--cyan)">${c.nu_TIV_THz}</td>
              <td><span class="badge badge-${c.risk_level}">${c.risk_level}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  // Footer
  document.getElementById("resultFooter").innerHTML = `
    Calculé en ${data._meta?.computation_time_s}s ·
    MICA-Kernel v${data._meta?.api_version} ·
    kyriosMICA · Bénin ·
    <a href="https://api.kyriosmica.com/docs" target="_blank">API Docs</a> ·
    <a href="https://github.com/kyriosMICA/MICA-KERNEL" target="_blank">GitHub</a>
  `;

  document.getElementById("results").style.display = "block";
  document.getElementById("results").classList.add("fade");
  document.getElementById("results").scrollIntoView({ behavior: "smooth" });
}

// Enter key
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("seqInput").addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "Enter") runAnalysis();
  });
});
</script>
